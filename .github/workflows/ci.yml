name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  render-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install cookiecutter
        run: uv tool install cookiecutter

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install Swift (Linux)
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2

      - name: Check template sync
        run: uv run tools/sync_check.py

      - name: Enforce template version bumps
        if: github.event_name == 'pull_request'
        run: uv run tools/sync_check.py --enforce-bumps --bump-base origin/${{ github.base_ref }}

      - name: Run render tests
        run: uv run tools/render_test.py

      - name: Test update-check hook
        run: uv run tools/test_update_check.py

      - name: Upload rendered projects on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-projects-${{ matrix.os }}
          path: /tmp/cookiecutter-render-*
          retention-days: 3
